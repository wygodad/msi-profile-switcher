name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja bez literki v (np. 1.0.1)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Ustal wersje
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace 'refs/tags/v', ''
          } else {
            $v = '${{ github.event.inputs.version }}'
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Wersja: $v"

      - name: Publish (single-file, self-contained)
        shell: pwsh
        run: |
          dotnet publish MSIProfileSwitcher.csproj -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=none `
            -p:Version=${{ steps.ver.outputs.version }} -o publish

      - name: Utworz Release i dolacz exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: MSI Profile Switcher v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: publish/MSIProfileSwitcher.exe
